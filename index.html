<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NEO Quotes">
<meta name="theme-color" content="#1B2A4A">
<title>NEO Surface · Quotes</title>
<style>
/* ── TOKENS ── */
:root {
  --navy:    #1B2A4A;
  --navy2:   #243660;
  --gold:    #C9A84C;
  --gold2:   #e4c46a;
  --orange:  #d4621a;
  --cream:   #f6f2ea;
  --border:  #ddd8cc;
  --bg:      #edeef2;
  --white:   #ffffff;
  --text:    #1a1a2e;
  --muted:   #7a8aa0;
  --green:   #2a7d4f;
  --red:     #b83232;
  --amber:   #b07d10;
  --safe:    env(safe-area-inset-bottom, 0px);
}

/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px}
button{cursor:pointer;border:none;font-family:inherit}
input,select,textarea{font-family:inherit;font-size:15px}

/* ── APP SHELL ── */
#app{display:flex;flex-direction:column;height:100%;height:100dvh}

/* ── TOP BAR ── */
.topbar{
  background:var(--navy);border-bottom:3px solid var(--gold);
  padding:0 16px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;z-index:50;
  padding-top:env(safe-area-inset-top,0);
}
.topbar-brand{display:flex;align-items:center;gap:10px}
.brand-badge{background:var(--gold);color:var(--navy);font-weight:900;font-size:14px;padding:4px 10px;border-radius:4px;letter-spacing:1px}
.brand-text{color:var(--white);font-size:14px;font-weight:600;line-height:1.2}
.brand-sub{color:var(--muted);font-size:10px;letter-spacing:.8px;text-transform:uppercase}
.topbar-actions{display:flex;gap:8px}
.icon-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:var(--white);border-radius:8px;padding:7px 12px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px}
.icon-btn.gold{background:var(--gold);color:var(--navy);border-color:var(--gold)}

/* ── BOTTOM NAV ── */
.bottom-nav{
  background:var(--navy);border-top:2px solid var(--gold);
  display:flex;flex-shrink:0;
  padding-bottom:var(--safe);
}
.nav-tab{flex:1;padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;background:none;border:none;transition:color .15s}
.nav-tab.active{color:var(--gold)}
.nav-tab svg{width:22px;height:22px}

/* ── SCREENS ── */
.screen{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen.active{display:block}

/* ── HISTORY SCREEN ── */
.screen-head{padding:16px;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.search-bar{display:flex;gap:8px;align-items:center}
.search-input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;background:var(--bg)}
.search-input:focus{outline:none;border-color:var(--navy)}
.filter-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.filter-chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:var(--white);color:var(--muted)}
.filter-chip.active{background:var(--navy);color:var(--gold);border-color:var(--navy)}

.quote-list{padding:12px}
.quote-card{background:var(--white);border-radius:12px;border:1px solid var(--border);margin-bottom:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:box-shadow .15s}
.quote-card:active{box-shadow:0 0 0 2px var(--gold)}
.qc-icon{width:42px;height:42px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qc-icon svg{width:20px;height:20px;fill:var(--gold)}
.qc-body{flex:1;min-width:0}
.qc-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qc-num{font-size:12px;color:var(--muted)}
.qc-right{text-align:right;flex-shrink:0}
.qc-total{font-weight:800;font-size:15px;color:var(--navy)}
.status-badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-top:3px}
.status-badge.pending{background:#fff8e6;color:var(--amber);border:1px solid #f0d080}
.status-badge.approved{background:#e6f4ee;color:var(--green);border:1px solid #90cca8}
.status-badge.declined{background:#fce8e8;color:var(--red);border:1px solid #e8a0a0}

.empty-hist{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-hist .ei{font-size:48px;margin-bottom:12px}
.empty-hist p{font-size:14px;line-height:1.6}

/* ── BUILDER SCREEN ── */
.builder-wrap{padding:12px;padding-bottom:80px}
.section-card{background:var(--white);border-radius:12px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden}
.section-head{background:var(--navy);padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
.section-head h3{color:var(--gold);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.section-head span{color:var(--muted);font-size:10px}
.section-body{padding:14px}

.field{margin-bottom:12px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.field input,.field select,.field textarea{
  width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;
  font-size:15px;color:var(--text);background:var(--white);
}
.field input:focus,.field select:focus{outline:none;border-color:var(--navy)}
.field input[readonly]{background:#f4f4f4;color:var(--muted)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* ── ZONE CARDS ── */
.zone-card{background:var(--white);border-radius:12px;border:1.5px solid var(--border);margin-bottom:10px;overflow:hidden}
.zone-head{background:var(--navy2);padding:11px 14px;display:flex;align-items:center;gap:10px}
.zone-letter{background:var(--gold);color:var(--navy);font-weight:900;font-size:14px;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.zone-name-inp{background:transparent;border:none;color:var(--white);font-size:14px;font-weight:600;flex:1;min-width:0}
.zone-name-inp:focus{outline:none;border-bottom:1px solid var(--gold)}
.zone-name-inp::placeholder{color:var(--muted)}
.zone-total{background:var(--gold);color:var(--navy);font-weight:800;font-size:13px;padding:4px 10px;border-radius:6px;white-space:nowrap;flex-shrink:0}
.zone-del{background:none;color:var(--muted);font-size:20px;padding:0 4px;flex-shrink:0}
.zone-del:active{color:var(--red)}
.zone-body{padding:14px}
.zone-li{background:var(--cream);border-radius:8px;padding:10px 12px;margin-top:10px;font-size:12px}
.zli-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border);color:var(--text)}
.zli-row:last-child{border:none;font-weight:700;color:var(--navy)}
.zli-amt{font-weight:600}
.artifix-row{display:none;margin-top:10px}
.artifix-row.show{display:block}
.custom-row{display:none;margin-top:10px}
.custom-row.show{display:block}

.add-zone-btn{width:100%;padding:14px;background:var(--white);border:2px dashed var(--gold);border-radius:12px;color:var(--navy);font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px}
.add-zone-btn:active{background:var(--cream)}

/* ── STICKY TOTAL FOOTER ── */
.sticky-footer{
  position:fixed;bottom:calc(56px + var(--safe));left:0;right:0;
  background:var(--navy);border-top:2px solid var(--gold);
  padding:10px 16px;z-index:40;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.sf-item{text-align:center}
.sf-label{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.sf-val{font-size:18px;font-weight:800;color:var(--gold);margin-top:1px}
.sf-val.grand{color:var(--orange);font-size:22px}
.sf-actions{display:flex;gap:8px}
.sf-btn{padding:10px 16px;border-radius:8px;font-size:13px;font-weight:700}
.sf-btn.save{background:var(--gold);color:var(--navy)}
.sf-btn.print{background:rgba(255,255,255,.1);color:var(--white);border:1px solid rgba(255,255,255,.2)}

/* ── DETAIL SCREEN ── */
.detail-head{padding:16px;background:var(--white);border-bottom:1px solid var(--border)}
.detail-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.meta-chip{background:var(--cream);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--muted)}
.meta-chip strong{color:var(--navy)}
.detail-body{padding:12px}
.detail-zone{background:var(--white);border-radius:10px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden}
.dz-head{background:var(--navy);padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.dz-head span{color:var(--gold);font-size:12px;font-weight:700}
.dz-head .dz-tot{color:var(--white);font-weight:700}
.dz-body{padding:12px;font-size:13px}
.dz-line{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);color:var(--text)}
.dz-line:last-child{border:none}
.detail-totals{background:var(--navy);border-radius:12px;padding:16px;margin-bottom:12px}
.dt-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.08);font-size:14px}
.dt-row:last-child{border:none;margin-top:4px;padding-top:8px}
.dt-label{color:var(--muted)}
.dt-val{color:var(--white);font-weight:600}
.dt-val.grand{color:var(--orange);font-size:20px;font-weight:900}
.savings-box{background:linear-gradient(135deg,var(--navy),var(--navy2));border:1px solid var(--gold);border-radius:12px;padding:14px;margin-bottom:12px}
.sav-title{color:var(--gold);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.sav-compare{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sav-col{flex:1;background:rgba(0,0,0,.2);border-radius:8px;padding:8px;text-align:center}
.sav-col-label{font-size:9px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase}
.sav-col-val{font-size:16px;font-weight:800;color:var(--white);margin-top:2px}
.sav-col-val.you{color:var(--gold)}
.vs-div{color:var(--muted);font-size:11px;font-weight:700}
.sav-result{background:var(--gold);border-radius:8px;padding:10px;text-align:center}
.sav-result-val{font-size:18px;font-weight:900;color:var(--navy)}
.sav-result-label{font-size:10px;font-weight:700;color:var(--navy);letter-spacing:.5px;margin-top:2px}

.status-bar{display:flex;gap:8px;margin-bottom:12px}
.status-btn{flex:1;padding:10px;border-radius:8px;font-size:12px;font-weight:700;border:2px solid var(--border);background:var(--white);color:var(--muted)}
.status-btn.active-pending{border-color:var(--amber);background:#fff8e6;color:var(--amber)}
.status-btn.active-approved{border-color:var(--green);background:#e6f4ee;color:var(--green)}
.status-btn.active-declined{border-color:var(--red);background:#fce8e8;color:var(--red)}
.detail-actions{display:flex;gap:8px;padding-bottom:80px}
.da-btn{flex:1;padding:13px;border-radius:10px;font-size:13px;font-weight:700}
.da-btn.edit{background:var(--navy);color:var(--gold);border:2px solid var(--navy)}
.da-btn.print{background:var(--white);color:var(--navy);border:2px solid var(--border)}
.da-btn.del{background:var(--white);color:var(--red);border:2px solid var(--border)}

/* ── TOAST ── */
.toast{
  position:fixed;top:70px;left:50%;transform:translateX(-50%);
  background:var(--navy);color:var(--white);padding:10px 20px;border-radius:10px;
  font-size:13px;font-weight:600;border:1px solid var(--gold);
  z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1}

/* ── PRINT ── */
@media print{
  .topbar,.bottom-nav,.sticky-footer,.add-zone-btn,.zone-del,.status-bar,.detail-actions,.no-print{display:none!important}
  #app{overflow:visible;height:auto}
  .screen{display:block!important;overflow:visible}
  body{background:white;font-size:12px}
  .detail-head,.detail-body{padding:10px 0}
  .detail-totals,.savings-box,.detail-zone,.section-card,.zone-card{break-inside:avoid}
  .detail-totals{background:white!important;border:2px solid var(--navy)!important}
  .dt-label,.dt-val,.dt-val.grand,.sav-col-label,.sav-col-val{color:var(--navy)!important}
  .savings-box{background:white!important;border:2px solid var(--navy)!important}
  .sav-col{background:#f0f0f0!important}
  .print-header{display:block!important;text-align:center;margin-bottom:20px;padding-bottom:10px;border-bottom:3px solid var(--navy)}
  .print-header h1{font-size:22px;color:var(--navy)}
  .print-header p{color:#666;font-size:12px}
}
.print-header{display:none}
</style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="brand-badge">NEO</div>
      <div>
        <div class="brand-text">Surface Quotes</div>
        <div class="brand-sub">ARDEX · Cleveland</div>
      </div>
    </div>
    <div class="topbar-actions" id="topbar-actions">
      <button class="icon-btn gold" onclick="startNewQuote()">+ New</button>
    </div>
  </div>

  <!-- HISTORY SCREEN -->
  <div class="screen active" id="screen-history">
    <div class="screen-head no-print">
      <div class="search-bar">
        <input class="search-input" type="text" placeholder="Search client or quote #…" id="search-input" oninput="renderHistory()">
      </div>
      <div class="filter-row">
        <button class="filter-chip active" data-filter="all" onclick="setFilter(this,'all')">All</button>
        <button class="filter-chip" data-filter="pending" onclick="setFilter(this,'pending')">Pending</button>
        <button class="filter-chip" data-filter="approved" onclick="setFilter(this,'approved')">Approved</button>
        <button class="filter-chip" data-filter="declined" onclick="setFilter(this,'declined')">Declined</button>
      </div>
    </div>
    <div class="quote-list" id="quote-list"></div>
  </div>

  <!-- BUILDER SCREEN -->
  <div class="screen" id="screen-builder">
    <div class="builder-wrap">

      <!-- Client Info -->
      <div class="section-card">
        <div class="section-head"><h3>Client Info</h3><span id="qn-display">QT-2026-001</span></div>
        <div class="section-body">
          <div class="field"><label>Client Name</label><input type="text" id="b-name" placeholder="Full name" oninput="liveCalc()"></div>
          <div class="field"><label>Address</label><input type="text" id="b-address" placeholder="Street, City, State ZIP" oninput="liveCalc()"></div>
          <div class="row2">
            <div class="field"><label>Phone</label><input type="tel" id="b-phone" placeholder="(216) 555-0000"></div>
            <div class="field"><label>Email</label><input type="email" id="b-email" placeholder="email@example.com"></div>
          </div>
          <div class="row3">
            <div class="field"><label>Quote #</label><input type="text" id="b-qnum" value="QT-2026-001" oninput="document.getElementById('qn-display').textContent=this.value"></div>
            <div class="field"><label>Date</label><input type="text" id="b-date" readonly></div>
            <div class="field"><label>Valid (days)</label><input type="number" id="b-valid" value="30" min="1"></div>
          </div>
        </div>
      </div>

      <!-- Zones -->
      <div id="zone-list-builder"></div>
      <button class="add-zone-btn" onclick="addZone()">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Zone
      </button>

    </div>
    <!-- Sticky footer -->
    <div class="sticky-footer" id="sticky-footer">
      <div class="sf-item"><div class="sf-label">Deposit</div><div class="sf-val" id="sf-dep">$0</div></div>
      <div class="sf-item"><div class="sf-label">Total</div><div class="sf-val grand" id="sf-total">$0</div></div>
      <div class="sf-item"><div class="sf-label">Balance</div><div class="sf-val" id="sf-bal">$0</div></div>
      <div class="sf-actions">
        <button class="sf-btn print no-print" onclick="printCurrent()">⎙</button>
        <button class="sf-btn save" onclick="saveQuote()">Save</button>
      </div>
    </div>
  </div>

  <!-- DETAIL SCREEN -->
  <div class="screen" id="screen-detail">
    <div class="print-header">
      <h1>NEO Surface LLC</h1>
      <p>ARDEX-Certified Concrete Resurfacing · Cleveland, OH · (216) 555-0000</p>
    </div>
    <div class="detail-head no-print">
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="goBack()" style="background:none;border:none;font-size:20px;color:var(--navy);padding:0 4px">←</button>
        <div>
          <div style="font-weight:700;font-size:16px" id="det-name">—</div>
          <div style="font-size:12px;color:var(--muted)" id="det-num">—</div>
        </div>
      </div>
      <div class="detail-meta">
        <div class="meta-chip" id="det-date-chip">—</div>
        <div class="meta-chip" id="det-addr-chip">—</div>
        <div class="meta-chip" id="det-sqft-chip">—</div>
      </div>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav no-print">
    <button class="nav-tab active" id="tab-history" onclick="showScreen('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
      Quotes
    </button>
    <button class="nav-tab" id="tab-builder" onclick="showScreen('builder')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      New Quote
    </button>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
// ── CONSTANTS ──
const RATES = { cd:7, artifix:8, regrade:4, tearout:15 };
const LABELS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const WORK_TYPES = {
  cd_only:    'CD Overlay Only',
  artifix_cd: 'Artifix Crack Fill + CD',
  regrade_cd: 'Fill to Regrade + CD',
  tearout_cd: 'Tearout & Rebuild + CD',
  custom:     'Custom (manual)'
};

// ── STATE ──
let zones = [];
let zoneCounter = 0;
let activeFilter = 'all';
let currentDetailId = null;

// ── STORAGE ──
function loadQuotes(){ try{ return JSON.parse(localStorage.getItem('neo_quotes')||'[]') }catch(e){return[]} }
function saveQuotes(q){ localStorage.setItem('neo_quotes', JSON.stringify(q)) }
function nextQuoteNum(){
  const q = loadQuotes();
  if(!q.length) return 'QT-2026-001';
  const nums = q.map(x=>parseInt(x.quote_number?.replace(/\D/g,'')||0));
  const max = Math.max(...nums);
  return 'QT-2026-' + String(max+1).padStart(3,'0');
}

// ── INIT ──
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('b-date').value = fmtDate(new Date());
  renderHistory();
});

function fmtDate(d){
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function fmtMoney(n){ return '$'+parseFloat(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}) }

// ── NAVIGATION ──
function showScreen(s){
  document.querySelectorAll('.screen').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('screen-'+s).classList.add('active');
  const tab = document.getElementById('tab-'+s);
  if(tab) tab.classList.add('active');
  const ta = document.getElementById('topbar-actions');
  ta.innerHTML = s==='builder' ? '<button class="icon-btn" onclick="showScreen(\'history\')">History</button>' :
                 s==='history' ? '<button class="icon-btn gold" onclick="startNewQuote()">+ New</button>' : '';
  if(s==='detail') ta.innerHTML = `<button class="icon-btn" onclick="goBack()">← Back</button>`;
}

function goBack(){
  showScreen('history');
}

// ── HISTORY ──
function setFilter(el, val){
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  activeFilter = val;
  renderHistory();
}

function renderHistory(){
  const all = loadQuotes();
  const q = document.getElementById('search-input').value.toLowerCase();
  const list = document.getElementById('quote-list');
  let filtered = all
    .filter(x => activeFilter==='all' || x.status===activeFilter)
    .filter(x => !q || x.client_name?.toLowerCase().includes(q) || x.quote_number?.toLowerCase().includes(q))
    .sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));

  if(!filtered.length){
    list.innerHTML = `<div class="empty-hist"><div class="ei">📋</div><p>${all.length?'No quotes match this filter.':'No quotes yet.<br>Tap <strong>+ New</strong> to build your first quote.'}</p></div>`;
    return;
  }
  list.innerHTML = filtered.map(q => `
    <div class="quote-card" onclick="openDetail('${q.id}')">
      <div class="qc-icon"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg></div>
      <div class="qc-body">
        <div class="qc-name">${escHtml(q.client_name||'Unnamed Client')}</div>
        <div class="qc-num">${escHtml(q.quote_number||'—')} · ${fmtDate(new Date(q.created_at))}</div>
      </div>
      <div class="qc-right">
        <div class="qc-total">${fmtMoney(q.grand_total)}</div>
        <div class="status-badge ${q.status||'pending'}">${q.status||'pending'}</div>
      </div>
    </div>`).join('');
}

// ── NEW QUOTE ──
function startNewQuote(){
  zones = [];
  zoneCounter = 0;
  document.getElementById('b-name').value='';
  document.getElementById('b-address').value='';
  document.getElementById('b-phone').value='';
  document.getElementById('b-email').value='';
  const num = nextQuoteNum();
  document.getElementById('b-qnum').value = num;
  document.getElementById('qn-display').textContent = num;
  document.getElementById('b-date').value = fmtDate(new Date());
  document.getElementById('b-valid').value = 30;
  document.getElementById('zone-list-builder').innerHTML = '';
  liveCalc();
  showScreen('builder');
}

// ── ZONE BUILDER ──
function addZone(){
  const id = ++zoneCounter;
  const label = LABELS[(zones.length)%26];
  const z = {id,label,name:'',width:'',length:'',sqft:0,workType:'cd_only',artifixLnft:'',customDesc:'',customPrice:'',total:0,lines:[]};
  zones.push(z);
  const wrap = document.getElementById('zone-list-builder');
  const div = document.createElement('div');
  div.className='zone-card'; div.id=`zc-${id}`;
  div.innerHTML = `
    <div class="zone-head">
      <div class="zone-letter">${label}</div>
      <input class="zone-name-inp" type="text" placeholder="Zone description" oninput="zf(${id},'name',this.value)">
      <div class="zone-total" id="zt-${id}">$0.00</div>
      <button class="zone-del" onclick="removeZone(${id})">×</button>
    </div>
    <div class="zone-body">
      <div class="row3">
        <div class="field"><label>Width ft</label><input type="number" inputmode="decimal" min="0" placeholder="0" oninput="zf(${id},'width',this.value)"></div>
        <div class="field"><label>Length ft</label><input type="number" inputmode="decimal" min="0" placeholder="0" oninput="zf(${id},'length',this.value)"></div>
        <div class="field"><label>Sq Ft</label><input type="number" id="zsf-${id}" readonly></div>
      </div>
      <div class="field" style="margin-top:10px"><label>Work Type</label>
        <select onchange="zf(${id},'workType',this.value)">
          ${Object.entries(WORK_TYPES).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}
        </select>
      </div>
      <div class="artifix-row" id="ar-${id}">
        <div class="field"><label>Artifix Linear Feet</label><input type="number" inputmode="decimal" min="0" placeholder="0 ln ft" oninput="zf(${id},'artifixLnft',this.value)"></div>
      </div>
      <div class="custom-row" id="cr-${id}">
        <div class="row2">
          <div class="field"><label>Description</label><input type="text" placeholder="Custom work" oninput="zf(${id},'customDesc',this.value)"></div>
          <div class="field"><label>Price ($)</label><input type="number" inputmode="decimal" min="0" placeholder="0.00" oninput="zf(${id},'customPrice',this.value)"></div>
        </div>
      </div>
      <div class="zone-li" id="zli-${id}"><div class="zli-row"><span style="color:var(--muted)">Enter dimensions above</span></div></div>
    </div>`;
  wrap.appendChild(div);
}

function zf(id, field, val){
  const z = zones.find(z=>z.id===id); if(!z) return;
  z[field]=val;
  const w=parseFloat(z.width)||0, l=parseFloat(z.length)||0;
  z.sqft = w*l;
  const sfEl = document.getElementById(`zsf-${id}`);
  if(sfEl) sfEl.value = z.sqft||'';
  document.getElementById(`ar-${id}`).className = 'artifix-row'+(z.workType==='artifix_cd'?' show':'');
  document.getElementById(`cr-${id}`).className = 'custom-row'+(z.workType==='custom'?' show':'');
  calcZone(z);
  liveCalc();
}

function removeZone(id){
  zones = zones.filter(z=>z.id!==id);
  document.getElementById(`zc-${id}`)?.remove();
  zones.forEach((z,i)=>{ z.label=LABELS[i%26]; const b=document.querySelector(`#zc-${z.id} .zone-letter`); if(b) b.textContent=z.label; });
  liveCalc();
}

function calcZone(z){
  const sqft=z.sqft; let total=0,lines=[];
  if(z.workType==='cd_only'){
    const t=sqft*RATES.cd; total=t;
    if(sqft>0) lines.push({d:`CD overlay (${sqft} sq ft × $${RATES.cd})`,a:t});
  } else if(z.workType==='artifix_cd'){
    const lnft=parseFloat(z.artifixLnft)||0;
    const at=lnft*RATES.artifix, ct=sqft*RATES.cd; total=at+ct;
    if(lnft>0) lines.push({d:`Artifix crack fill (${lnft} ln ft × $${RATES.artifix})`,a:at});
    if(sqft>0) lines.push({d:`CD overlay (${sqft} sq ft × $${RATES.cd})`,a:ct});
  } else if(z.workType==='regrade_cd'){
    const rt=sqft*RATES.regrade, ct=sqft*RATES.cd; total=rt+ct;
    if(sqft>0){ lines.push({d:`Fill to regrade (${sqft} sq ft × $${RATES.regrade})`,a:rt}); lines.push({d:`CD overlay (${sqft} sq ft × $${RATES.cd})`,a:ct}); }
  } else if(z.workType==='tearout_cd'){
    const tt=sqft*RATES.tearout, ct=sqft*RATES.cd; total=tt+ct;
    if(sqft>0){ lines.push({d:`Tearout & disposal (${sqft} sq ft × $${RATES.tearout})`,a:tt}); lines.push({d:`CD overlay (${sqft} sq ft × $${RATES.cd})`,a:ct}); }
  } else if(z.workType==='custom'){
    const p=parseFloat(z.customPrice)||0; total=p;
    if(p>0) lines.push({d:z.customDesc||'Custom work',a:p});
  }
  z.total=total; z.lines=lines;
  const badge=document.getElementById(`zt-${z.id}`);
  if(badge) badge.textContent=fmtMoney(total);
  const zli=document.getElementById(`zli-${z.id}`);
  if(zli){
    if(!lines.length){ zli.innerHTML=`<div class="zli-row"><span style="color:var(--muted)">Enter dimensions above</span></div>`; return; }
    zli.innerHTML = lines.map(l=>`<div class="zli-row"><span>${l.d}</span><span class="zli-amt">${fmtMoney(l.a)}</span></div>`).join('')
      + `<div class="zli-row"><span>Zone Total</span><span class="zli-amt">${fmtMoney(total)}</span></div>`;
  }
}

function liveCalc(){
  const grand=zones.reduce((s,z)=>s+(z.total||0),0);
  const dep=grand/2;
  document.getElementById('sf-total').textContent=fmtMoney(grand);
  document.getElementById('sf-dep').textContent=fmtMoney(dep);
  document.getElementById('sf-bal').textContent=fmtMoney(dep);
}

// ── SAVE QUOTE ──
function saveQuote(){
  const name = document.getElementById('b-name').value.trim();
  if(!name){ toast('Enter a client name first'); return; }
  if(!zones.length){ toast('Add at least one zone'); return; }
  const grand = zones.reduce((s,z)=>s+(z.total||0),0);
  const q = {
    id: Date.now()+'',
    quote_number: document.getElementById('b-qnum').value.trim(),
    client_name:  name,
    client_address: document.getElementById('b-address').value.trim(),
    client_phone:   document.getElementById('b-phone').value.trim(),
    client_email:   document.getElementById('b-email').value.trim(),
    date:           document.getElementById('b-date').value,
    valid_days:     document.getElementById('b-valid').value,
    status:         'pending',
    grand_total:    grand,
    zones:          JSON.parse(JSON.stringify(zones)),
    created_at:     new Date().toISOString()
  };
  const all = loadQuotes();
  all.unshift(q);
  saveQuotes(all);
  toast('Quote saved!');
  setTimeout(()=>{ renderHistory(); showScreen('history'); },600);
}

// ── DETAIL VIEW ──
function openDetail(id){
  const q = loadQuotes().find(x=>x.id===id);
  if(!q) return;
  currentDetailId = id;
  document.getElementById('det-name').textContent = q.client_name||'Unnamed';
  document.getElementById('det-num').textContent  = q.quote_number||'—';
  document.getElementById('det-date-chip').innerHTML = `<strong>Date:</strong> ${q.date||'—'}`;
  document.getElementById('det-addr-chip').innerHTML = `<strong>Addr:</strong> ${q.client_address||'—'}`;
  const totalSqft = (q.zones||[]).reduce((s,z)=>s+(z.sqft||0),0);
  document.getElementById('det-sqft-chip').innerHTML = `<strong>Total:</strong> ${totalSqft} sq ft`;
  const grand = q.grand_total||0;
  const dep   = grand/2;
  const sqft  = totalSqft;
  const replLow  = sqft*20, replHigh = sqft*30;
  const saveLow  = replLow-grand, saveHigh = replHigh-grand;
  const pctLow   = sqft>0?Math.round(saveLow/replLow*100):0;
  const pctHigh  = sqft>0?Math.round(saveHigh/replHigh*100):0;

  const zonesHtml = (q.zones||[]).map(z=>`
    <div class="detail-zone">
      <div class="dz-head">
        <span>Zone ${z.label}${z.name?' — '+escHtml(z.name):''} (${z.sqft||0} sq ft)</span>
        <span class="dz-tot">${fmtMoney(z.total)}</span>
      </div>
      <div class="dz-body">
        ${(z.lines||[]).map(l=>`<div class="dz-line"><span>${escHtml(l.d)}</span><span>${fmtMoney(l.a)}</span></div>`).join('')}
      </div>
    </div>`).join('');

  const statusBtns = ['pending','approved','declined'].map(s=>`
    <button class="status-btn ${q.status===s?'active-'+s:''}" onclick="setStatus('${id}','${s}',this)">${s.charAt(0).toUpperCase()+s.slice(1)}</button>`).join('');

  document.getElementById('detail-body').innerHTML = `
    <div class="no-print">
      <div class="section-card" style="margin-bottom:10px">
        <div class="section-head"><h3>Status</h3></div>
        <div class="section-body"><div class="status-bar">${statusBtns}</div></div>
      </div>
    </div>
    ${zonesHtml}
    <div class="detail-totals">
      <div class="dt-row"><span class="dt-label">Subtotal</span><span class="dt-val">${fmtMoney(grand)}</span></div>
      <div class="dt-row"><span class="dt-label">Deposit (50%)</span><span class="dt-val">${fmtMoney(dep)}</span></div>
      <div class="dt-row"><span class="dt-label">Balance at Completion</span><span class="dt-val">${fmtMoney(dep)}</span></div>
      <div class="dt-row"><span class="dt-label">TOTAL INVESTMENT</span><span class="dt-val grand">${fmtMoney(grand)}</span></div>
    </div>
    ${sqft>0?`
    <div class="savings-box">
      <div class="sav-title">💰 Savings vs. Full Replacement</div>
      <div class="sav-compare">
        <div class="sav-col"><div class="sav-col-label">Replacement</div><div class="sav-col-val">${fmtMoney(replLow)}–${fmtMoney(replHigh)}</div><div style="font-size:9px;color:var(--muted);margin-top:2px">$20–$30/sq ft</div></div>
        <div class="vs-div">VS</div>
        <div class="sav-col"><div class="sav-col-label">NEO Surface</div><div class="sav-col-val you">${fmtMoney(grand)}</div><div style="font-size:9px;color:var(--muted);margin-top:2px">your quote</div></div>
      </div>
      <div class="sav-result">
        <div class="sav-result-val">${fmtMoney(saveLow)} – ${fmtMoney(saveHigh)}</div>
        <div class="sav-result-label">YOU SAVE · ${pctLow}%–${pctHigh}% less than replacement</div>
      </div>
    </div>`:''}
    <div class="detail-actions no-print">
      <button class="da-btn edit" onclick="editQuote('${id}')">✎ Edit</button>
      <button class="da-btn print" onclick="window.print()">⎙ Print</button>
      <button class="da-btn del" onclick="deleteQuote('${id}')">🗑</button>
    </div>`;

  showScreen('detail');
}

function setStatus(id, status, btn){
  const all = loadQuotes();
  const q = all.find(x=>x.id===id); if(!q) return;
  q.status = status;
  saveQuotes(all);
  // Update buttons
  document.querySelectorAll('.status-btn').forEach(b=>{
    b.className='status-btn';
    const s=b.getAttribute('onclick').match(/'(\w+)'\)/)?.[1];
    if(s===status) b.className='status-btn active-'+status;
  });
  renderHistory();
  toast('Status updated to '+status);
}

function editQuote(id){
  const q = loadQuotes().find(x=>x.id===id); if(!q) return;
  // Delete old and rebuild
  const all = loadQuotes().filter(x=>x.id!==id);
  saveQuotes(all);
  // Re-populate builder
  zones = (q.zones||[]).map(z=>({...z}));
  zoneCounter = zones.length;
  document.getElementById('b-name').value    = q.client_name||'';
  document.getElementById('b-address').value = q.client_address||'';
  document.getElementById('b-phone').value   = q.client_phone||'';
  document.getElementById('b-email').value   = q.client_email||'';
  document.getElementById('b-qnum').value    = q.quote_number||'';
  document.getElementById('qn-display').textContent = q.quote_number||'';
  document.getElementById('b-date').value    = q.date||fmtDate(new Date());
  document.getElementById('b-valid').value   = q.valid_days||30;
  const wrap = document.getElementById('zone-list-builder');
  wrap.innerHTML = '';
  zones.forEach(z=>{ zoneCounter=Math.max(zoneCounter,z.id); addZoneFromData(z); });
  liveCalc();
  showScreen('builder');
}

function addZoneFromData(z){
  const wrap = document.getElementById('zone-list-builder');
  const div = document.createElement('div');
  div.className='zone-card'; div.id=`zc-${z.id}`;
  div.innerHTML=`
    <div class="zone-head">
      <div class="zone-letter">${z.label}</div>
      <input class="zone-name-inp" type="text" placeholder="Zone description" value="${escAttr(z.name||'')}" oninput="zf(${z.id},'name',this.value)">
      <div class="zone-total" id="zt-${z.id}">${fmtMoney(z.total)}</div>
      <button class="zone-del" onclick="removeZone(${z.id})">×</button>
    </div>
    <div class="zone-body">
      <div class="row3">
        <div class="field"><label>Width ft</label><input type="number" inputmode="decimal" min="0" value="${z.width||''}" oninput="zf(${z.id},'width',this.value)"></div>
        <div class="field"><label>Length ft</label><input type="number" inputmode="decimal" min="0" value="${z.length||''}" oninput="zf(${z.id},'length',this.value)"></div>
        <div class="field"><label>Sq Ft</label><input type="number" id="zsf-${z.id}" value="${z.sqft||''}" readonly></div>
      </div>
      <div class="field" style="margin-top:10px"><label>Work Type</label>
        <select onchange="zf(${z.id},'workType',this.value)">
          ${Object.entries(WORK_TYPES).map(([k,v])=>`<option value="${k}"${z.workType===k?' selected':''}>${v}</option>`).join('')}
        </select>
      </div>
      <div class="artifix-row${z.workType==='artifix_cd'?' show':''}" id="ar-${z.id}">
        <div class="field"><label>Artifix Linear Feet</label><input type="number" inputmode="decimal" min="0" value="${z.artifixLnft||''}" oninput="zf(${z.id},'artifixLnft',this.value)"></div>
      </div>
      <div class="custom-row${z.workType==='custom'?' show':''}" id="cr-${z.id}">
        <div class="row2">
          <div class="field"><label>Description</label><input type="text" value="${escAttr(z.customDesc||'')}" oninput="zf(${z.id},'customDesc',this.value)"></div>
          <div class="field"><label>Price ($)</label><input type="number" inputmode="decimal" min="0" value="${z.customPrice||''}" oninput="zf(${z.id},'customPrice',this.value)"></div>
        </div>
      </div>
      <div class="zone-li" id="zli-${z.id}"></div>
    </div>`;
  wrap.appendChild(div);
  calcZone(z);
  const zli=document.getElementById(`zli-${z.id}`);
  if(zli && z.lines?.length){
    zli.innerHTML = z.lines.map(l=>`<div class="zli-row"><span>${escHtml(l.d)}</span><span class="zli-amt">${fmtMoney(l.a)}</span></div>`).join('')
      + `<div class="zli-row"><span>Zone Total</span><span class="zli-amt">${fmtMoney(z.total)}</span></div>`;
  }
}

function deleteQuote(id){
  if(!confirm('Delete this quote? This cannot be undone.')) return;
  const all = loadQuotes().filter(x=>x.id!==id);
  saveQuotes(all);
  renderHistory();
  showScreen('history');
  toast('Quote deleted');
}

function printCurrent(){ window.print(); }

// ── UTILITIES ──
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function escAttr(s){ return String(s||'').replace(/"/g,'&quot;') }
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}
</script>
